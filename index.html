<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Anonim Media Devori</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='12' fill='%2324A1DE'/%3E%3Cpath d='M12 5v14M5 12h14' stroke='white' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #24A1DE;
            --primary-dark: #1a7fb0;
            --bg: #0e0e0e;
            --card-bg: #1c1c1c;
            --text: #ffffff;
            --text-secondary: #aaaaaa;
            --border: #2b2b2b;
            --success: #2ecc71;
            --error: #e74c3c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ========== HEADER ========== */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--bg);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #6ec8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-stats {
            display: flex;
            gap: 16px;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .connection-status.online {
            background: rgba(46, 204, 113, 0.2);
            color: var(--success);
        }

        .connection-status.offline {
            background: rgba(231, 76, 60, 0.2);
            color: var(--error);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }

        /* ========== MAIN CONTENT ========== */
        .content {
            padding-top: 70px;
            padding-bottom: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 16px;
        }

        /* ========== POSTS ========== */
        .posts-feed {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .post-card {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .post-header {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .post-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #6ec8ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: white;
        }

        .post-info {
            flex: 1;
        }

        .post-author {
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
        }

        .post-time {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .post-text {
            padding: 16px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .post-media {
            position: relative;
            cursor: pointer;
        }

        .post-media img, .post-media video {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            display: block;
        }

        .post-media audio {
            width: 100%;
            margin: 8px 0;
        }

        .post-file {
            padding: 16px;
            background: #242424;
            margin: 8px 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .post-file:hover {
            background: #2a2a2a;
        }

        .file-icon {
            font-size: 32px;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .file-size {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .post-actions {
            padding: 12px 16px;
            display: flex;
            gap: 20px;
            border-top: 1px solid var(--border);
        }

        .post-actions button {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            transition: background 0.2s;
        }

        .post-actions button:hover {
            background: #2a2a2a;
        }

        .delete-btn {
            color: var(--error) !important;
            margin-left: auto;
        }

        /* ========== FAB ========== */
        .fab {
            position: fixed;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: var(--primary);
            border: none;
            box-shadow: 0 4px 20px rgba(36, 161, 222, 0.4);
            cursor: grab;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: 300;
            transition: box-shadow 0.2s, transform 0.1s;
            user-select: none;
            touch-action: none;
        }

        .fab:active {
            cursor: grabbing;
            box-shadow: 0 8px 30px rgba(36, 161, 222, 0.5);
        }

        .fab.dragging {
            transition: none;
            opacity: 0.9;
        }

        /* ========== UPLOAD MODAL ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 300;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .upload-modal {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 24px 24px 0 0;
            padding: 24px 20px 20px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-size: 18px;
            font-weight: 600;
        }

        .close-modal {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            padding: 4px;
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            margin-bottom: 16px;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(36, 161, 222, 0.05);
        }

        .upload-area.drag-over {
            border-color: var(--primary);
            background: rgba(36, 161, 222, 0.1);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .upload-text {
            font-size: 15px;
            margin-bottom: 8px;
        }

        .upload-hint {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .preview-area {
            margin-bottom: 16px;
        }

        .preview-area img, .preview-area video {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
        }

        .preview-area audio {
            width: 100%;
        }

        .file-info-preview {
            background: #242424;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .caption-input {
            width: 100%;
            background: #242424;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 16px;
            color: var(--text);
            font-size: 15px;
            resize: none;
            min-height: 80px;
            margin-bottom: 16px;
            font-family: inherit;
        }

        .caption-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .upload-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .upload-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ========== FULLSCREEN VIEWER ========== */
        .viewer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: black;
            z-index: 400;
            display: none;
        }

        .viewer-overlay.show {
            display: flex;
            flex-direction: column;
        }

        .viewer-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            backdrop-filter: blur(10px);
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .viewer-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .viewer-content img, .viewer-content video {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
        }

        .viewer-content audio {
            width: 90%;
            max-width: 400px;
        }

        .viewer-file {
            text-align: center;
            color: white;
        }

        .viewer-file .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        /* ========== EMPTY STATE ========== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* ========== LOADING ========== */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(36, 161, 222, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== TOAST ========== */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 500;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
        }

        .toast.error {
            background: var(--error);
            color: white;
        }

        .toast.success {
            background: var(--success);
            color: white;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 600px) {
            .header {
                padding: 12px 16px;
            }
            
            .header h1 {
                font-size: 20px;
            }
            
            .container {
                padding: 0 12px;
            }
            
            .post-card {
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1>📢 Anonim Devor</h1>
        <div class="header-stats">
            <span id="connectionStatus" class="connection-status offline">
                <span class="status-dot"></span>
                <span id="statusText">Ulanish yo'q</span>
            </span>
            <span id="postCount">0 ta post</span>
        </div>
    </header>

    <!-- Main Content -->
    <div class="content">
        <div class="container">
            <div class="posts-feed" id="postsFeed">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Yuklanmoqda...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- FAB Button -->
    <button class="fab" id="fabBtn" style="bottom: 24px; right: 24px;">+</button>

    <!-- Upload Modal -->
    <div class="modal-overlay" id="uploadModal">
        <div class="upload-modal">
            <div class="modal-header">
                <h3>Yangi post qo'shish</h3>
                <button class="close-modal" id="closeModalBtn">&times;</button>
            </div>
            
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📤</div>
                <div class="upload-text">Fayl tanlash uchun bosing</div>
                <div class="upload-hint">Rasm, video, audio, PDF, SVG, har qanday fayl</div>
                <input type="file" id="fileInput" style="display: none;" accept="*/*">
            </div>
            
            <div class="preview-area" id="previewArea" style="display: none;"></div>
            <div class="file-info-preview" id="fileInfoPreview" style="display: none;"></div>
            
            <textarea class="caption-input" id="captionInput" placeholder="Izoh qo'shish... (ixtiyoriy)"></textarea>
            
            <button class="upload-btn" id="uploadBtn" disabled>📤 Yuklash</button>
        </div>
    </div>

    <!-- Fullscreen Viewer -->
    <div class="viewer-overlay" id="viewerOverlay">
        <div class="viewer-header">
            <button class="back-btn" id="closeViewerBtn">←</button>
        </div>
        <div class="viewer-content" id="viewerContent"></div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script type="module">
        // ========== FIREBASE & SUPABASE CONFIG ==========
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { 
            getFirestore, 
            collection, 
            addDoc, 
            query, 
            orderBy, 
            onSnapshot,
            deleteDoc,
            doc,
            serverTimestamp
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        // Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBhzWWFFgrOH84J2RIW5o7l_8192iPtbOg",
            authDomain: "code-vibe-df610.firebaseapp.com",
            projectId: "code-vibe-df610",
            storageBucket: "code-vibe-df610.firebasestorage.app",
            messagingSenderId: "747762490655",
            appId: "1:747762490655:web:125516814620784cf3a42a"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Supabase (tekshirilgan URL)
        const SUPABASE_URL = "https://mujoriozaxjojrgkkars.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11am9yaW96YXhqb2pyZ2trYXJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjQ1MjQsImV4cCI6MjA5MDU0MDUyNH0.IiCWIT5QU06Wd7fEgRtTkG4IoC5oxyTgRAuWxRf15Zw";
        
        let supabase;
        let isSupabaseConnected = false;
        
        try {
            supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
            console.log('✅ Supabase client yaratildi');
        } catch (error) {
            console.error('❌ Supabase client yaratishda xatolik:', error);
        }

        const BUCKET = "videos";

        // ========== CONNECTION STATUS ==========
        const connectionStatus = document.getElementById('connectionStatus');
        const statusText = document.getElementById('statusText');
        
        async function checkSupabaseConnection() {
            if (!supabase) {
                updateConnectionStatus(false);
                return false;
            }
            
            try {
                const { data, error } = await supabase.storage.from(BUCKET).list('', { limit: 1 });
                if (error) throw error;
                updateConnectionStatus(true);
                return true;
            } catch (error) {
                console.warn('Supabase ulanish xatosi:', error.message);
                updateConnectionStatus(false);
                return false;
            }
        }
        
        function updateConnectionStatus(connected) {
            isSupabaseConnected = connected;
            if (connected) {
                connectionStatus.className = 'connection-status online';
                statusText.textContent = 'Ulangan';
            } else {
                connectionStatus.className = 'connection-status offline';
                statusText.textContent = 'Ulanish yo\'q';
            }
        }
        
        checkSupabaseConnection();
        setInterval(checkSupabaseConnection, 30000);

        // ========== STATE ==========
        let selectedFile = null;
        let allPosts = [];

        // ========== DOM ELEMENTS ==========
        const fabBtn = document.getElementById('fabBtn');
        const uploadModal = document.getElementById('uploadModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewArea = document.getElementById('previewArea');
        const fileInfoPreview = document.getElementById('fileInfoPreview');
        const captionInput = document.getElementById('captionInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const postsFeed = document.getElementById('postsFeed');
        const postCount = document.getElementById('postCount');
        const toast = document.getElementById('toast');
        const viewerOverlay = document.getElementById('viewerOverlay');
        const viewerContent = document.getElementById('viewerContent');
        const closeViewerBtn = document.getElementById('closeViewerBtn');

        // ========== FAB DRAGGABLE ==========
        let isDragging = false;
        let startX, startY, startLeft, startBottom;
        
        fabBtn.addEventListener('mousedown', (e) => {
            if (e.target === fabBtn || fabBtn.contains(e.target)) {
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                const rect = fabBtn.getBoundingClientRect();
                startLeft = rect.left;
                startBottom = window.innerHeight - rect.bottom;
                fabBtn.classList.add('dragging');
                e.preventDefault();
            }
        });
        
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const deltaX = e.clientX - startX;
            const deltaY = e.clientY - startY;
            
            let newLeft = startLeft + deltaX;
            let newBottom = startBottom - deltaY;
            
            const fabWidth = 60;
            const maxLeft = window.innerWidth - fabWidth - 10;
            const maxBottom = window.innerHeight - fabWidth - 80;
            
            newLeft = Math.max(10, Math.min(newLeft, maxLeft));
            newBottom = Math.max(70, Math.min(newBottom, maxBottom));
            
            fabBtn.style.left = newLeft + 'px';
            fabBtn.style.right = 'auto';
            fabBtn.style.bottom = newBottom + 'px';
        });
        
        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                fabBtn.classList.remove('dragging');
            }
        });
        
        // Touch events
        fabBtn.addEventListener('touchstart', (e) => {
            isDragging = true;
            const touch = e.touches[0];
            startX = touch.clientX;
            startY = touch.clientY;
            const rect = fabBtn.getBoundingClientRect();
            startLeft = rect.left;
            startBottom = window.innerHeight - rect.bottom;
            fabBtn.classList.add('dragging');
            e.preventDefault();
        });
        
        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const touch = e.touches[0];
            const deltaX = touch.clientX - startX;
            const deltaY = touch.clientY - startY;
            
            let newLeft = startLeft + deltaX;
            let newBottom = startBottom - deltaY;
            
            const fabWidth = 60;
            const maxLeft = window.innerWidth - fabWidth - 10;
            const maxBottom = window.innerHeight - fabWidth - 80;
            
            newLeft = Math.max(10, Math.min(newLeft, maxLeft));
            newBottom = Math.max(70, Math.min(newBottom, maxBottom));
            
            fabBtn.style.left = newLeft + 'px';
            fabBtn.style.right = 'auto';
            fabBtn.style.bottom = newBottom + 'px';
            e.preventDefault();
        });
        
        document.addEventListener('touchend', () => {
            if (isDragging) {
                isDragging = false;
                fabBtn.classList.remove('dragging');
            }
        });

        // FAB click
        fabBtn.addEventListener('click', (e) => {
            if (!isDragging) {
                if (!isSupabaseConnected) {
                    showToast('❌ Serverga ulanmagan. Internetingizni tekshiring.', 'error');
                    return;
                }
                uploadModal.classList.add('show');
            }
        });

        // ========== MODAL ==========
        closeModalBtn.addEventListener('click', () => {
            uploadModal.classList.remove('show');
            resetForm();
        });
        
        uploadModal.addEventListener('click', (e) => {
            if (e.target === uploadModal) {
                uploadModal.classList.remove('show');
                resetForm();
            }
        });

        // ========== FILE UPLOAD ==========
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });
        
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });

        function handleFile(file) {
            selectedFile = file;
            
            previewArea.innerHTML = '';
            previewArea.style.display = 'block';
            
            const fileType = file.type.split('/')[0];
            
            if (fileType === 'image') {
                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                previewArea.appendChild(img);
            } else if (fileType === 'video') {
                const video = document.createElement('video');
                video.src = URL.createObjectURL(file);
                video.controls = true;
                previewArea.appendChild(video);
            } else if (fileType === 'audio') {
                const audio = document.createElement('audio');
                audio.src = URL.createObjectURL(file);
                audio.controls = true;
                previewArea.appendChild(audio);
            } else {
                previewArea.style.display = 'none';
            }
            
            fileInfoPreview.style.display = 'block';
            const fileSize = (file.size / 1024).toFixed(1);
            fileInfoPreview.innerHTML = `
                <div style="display: flex; align-items: center; gap: 12px;">
                    <span style="font-size: 32px;">📄</span>
                    <div>
                        <div style="font-weight: 500; margin-bottom: 4px;">${file.name}</div>
                        <div style="font-size: 12px; color: var(--text-secondary);">${fileSize} KB · ${file.type || 'noma\'lum'}</div>
                    </div>
                </div>
            `;
            
            uploadBtn.disabled = false;
        }

        function resetForm() {
            selectedFile = null;
            fileInput.value = '';
            previewArea.innerHTML = '';
            previewArea.style.display = 'none';
            fileInfoPreview.style.display = 'none';
            captionInput.value = '';
            uploadBtn.disabled = true;
        }

        // ========== TOAST ==========
        function showToast(message, type = 'info') {
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ========== UPLOAD TO SUPABASE ==========
        async function uploadToSupabase(file) {
            if (!supabase) throw new Error('Supabase ulanmagan');
            
            const timestamp = Date.now();
            const safeName = file.name.replace(/[^a-zA-Z0-9.-]/g, '_');
            const fileName = `posts/${timestamp}_${safeName}`;
            
            const { data, error } = await supabase.storage
                .from(BUCKET)
                .upload(fileName, file, {
                    cacheControl: '3600',
                    upsert: false,
                    contentType: file.type
                });
                
            if (error) {
                console.error('Supabase upload error:', error);
                throw error;
            }
            
            const { data: { publicUrl } } = supabase.storage
                .from(BUCKET)
                .getPublicUrl(data.path);
                
            return publicUrl;
        }

        // ========== SUBMIT POST ==========
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            if (!isSupabaseConnected) {
                showToast('❌ Serverga ulanmagan. Internetingizni tekshiring.', 'error');
                return;
            }
            
            uploadBtn.disabled = true;
            uploadBtn.textContent = '⏳ Yuklanmoqda...';
            
            try {
                const mediaUrl = await uploadToSupabase(selectedFile);
                const caption = captionInput.value.trim();
                
                const post = {
                    text: caption || null,
                    mediaUrl: mediaUrl,
                    mediaType: selectedFile.type,
                    fileName: selectedFile.name,
                    fileSize: selectedFile.size,
                    createdAt: serverTimestamp()
                };
                
                await addDoc(collection(db, 'posts'), post);
                
                showToast('✅ Post qo\'shildi!', 'success');
                uploadModal.classList.remove('show');
                resetForm();
                
            } catch (error) {
                console.error('Upload error:', error);
                
                let errorMessage = '❌ Xatolik yuz berdi';
                if (error.message?.includes('Failed to fetch') || error.message?.includes('network')) {
                    errorMessage = '❌ Internet aloqasi yo\'q yoki serverga ulanib bo\'lmadi';
                } else if (error.message?.includes('Supabase')) {
                    errorMessage = '❌ Supabase serveriga ulanishda xatolik';
                }
                
                showToast(errorMessage, 'error');
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = '📤 Yuklash';
            }
        });

        // ========== VIEWER ==========
        function openViewer(post) {
            viewerContent.innerHTML = '';
            
            const fileType = post.mediaType?.split('/')[0];
            
            if (fileType === 'image') {
                const img = document.createElement('img');
                img.src = post.mediaUrl;
                viewerContent.appendChild(img);
            } else if (fileType === 'video') {
                const video = document.createElement('video');
                video.src = post.mediaUrl;
                video.controls = true;
                video.autoplay = true;
                viewerContent.appendChild(video);
            } else if (fileType === 'audio') {
                const audio = document.createElement('audio');
                audio.src = post.mediaUrl;
                audio.controls = true;
                audio.autoplay = true;
                viewerContent.appendChild(audio);
            } else {
                viewerContent.innerHTML = `
                    <div class="viewer-file">
                        <div class="icon">📄</div>
                        <div style="margin-bottom: 10px; font-size: 18px;">${post.fileName || 'Fayl'}</div>
                        <a href="${post.mediaUrl}" target="_blank" style="color: var(--primary);">Yuklab olish</a>
                    </div>
                `;
            }
            
            viewerOverlay.classList.add('show');
        }

        closeViewerBtn.addEventListener('click', () => {
            viewerOverlay.classList.remove('show');
            viewerContent.innerHTML = '';
        });
        
        viewerOverlay.addEventListener('click', (e) => {
            if (e.target === viewerOverlay) {
                viewerOverlay.classList.remove('show');
                viewerContent.innerHTML = '';
            }
        });

        // ========== RENDER POSTS ==========
        function renderPosts() {
            if (allPosts.length === 0) {
                postsFeed.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>Hali postlar yo'q</p>
                        <p style="font-size: 13px; margin-top: 8px;">+ tugmasini bosing va post qo'shing!</p>
                    </div>
                `;
                postCount.textContent = '0 ta post';
                return;
            }
            
            postCount.textContent = `${allPosts.length} ta post`;
            
            postsFeed.innerHTML = allPosts.map(post => {
                const time = post.createdAt?.toDate?.() || new Date();
                const timeStr = new Intl.DateTimeFormat('uz-UZ', {
                    day: 'numeric',
                    month: 'long',
                    hour: '2-digit',
                    minute: '2-digit'
                }).format(time);
                
                const fileType = post.mediaType?.split('/')[0];
                const fileSize = post.fileSize ? (post.fileSize / 1024 / 1024).toFixed(1) + ' MB' : '';
                
                return `
                    <div class="post-card" data-id="${post.id}">
                        <div class="post-header">
                            <div class="post-avatar">👤</div>
                            <div class="post-info">
                                <div class="post-author">Anonim</div>
                                <div class="post-time">${timeStr}</div>
                            </div>
                        </div>
                        
                        ${post.text ? `<div class="post-text">${escapeHtml(post.text)}</div>` : ''}
                        
                        ${post.mediaUrl ? `
                            ${fileType === 'image' ? `
                                <div class="post-media" data-url="${post.mediaUrl}" data-type="image">
                                    <img src="${post.mediaUrl}" alt="Media" loading="lazy">
                                </div>
                            ` : fileType === 'video' ? `
                                <div class="post-media" data-url="${post.mediaUrl}" data-type="video">
                                    <video src="${post.mediaUrl}" controls preload="metadata"></video>
                                </div>
                            ` : fileType === 'audio' ? `
                                <div class="post-media" data-url="${post.mediaUrl}" data-type="audio">
                                    <audio src="${post.mediaUrl}" controls></audio>
                                </div>
                            ` : `
                                <div class="post-file" data-url="${post.mediaUrl}" data-type="file" data-name="${post.fileName || 'Fayl'}">
                                    <span class="file-icon">📄</span>
                                    <div class="file-info">
                                        <div class="file-name">${post.fileName || 'Fayl'}</div>
                                        <div class="file-size">${fileSize}</div>
                                    </div>
                                </div>
                            `}
                        ` : ''}
                        
                        <div class="post-actions">
                            <button class="copy-btn" data-url="${post.mediaUrl || ''}">
                                📋 Nusxalash
                            </button>
                            <button class="delete-btn" data-id="${post.id}">
                                🗑️ O'chirish
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            
            document.querySelectorAll('.post-media, .post-file').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (e.target.closest('button')) return;
                    const url = el.dataset.url;
                    const type = el.dataset.type;
                    const name = el.dataset.name;
                    
                    const post = { mediaUrl: url, mediaType: type, fileName: name };
                    openViewer(post);
                });
            });
            
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const url = btn.dataset.url;
                    if (url) {
                        navigator.clipboard?.writeText(url);
                        showToast('📋 Havola nusxalandi!', 'success');
                    }
                });
            });
            
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    if (confirm('Bu postni o\'chirmoqchimisiz?')) {
                        try {
                            await deleteDoc(doc(db, 'posts', id));
                            showToast('🗑️ Post o\'chirildi', 'success');
                        } catch (error) {
                            showToast('❌ O\'chirishda xatolik', 'error');
                        }
                    }
                });
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== REAL-TIME LISTENER ==========
        const postsQuery = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
        
        onSnapshot(postsQuery, (snapshot) => {
            allPosts = snapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data()
            }));
            renderPosts();
        }, (error) => {
            console.error('Snapshot error:', error);
            postsFeed.innerHTML = `
                <div class="empty-state">
                    <div class="icon">❌</div>
                    <p>Xatolik yuz berdi</p>
                </div>
            `;
        });

        // ========== KEYBOARD SHORTCUTS ==========
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                uploadModal.classList.remove('show');
                viewerOverlay.classList.remove('show');
                resetForm();
            }
        });

        console.log('🚀 Anonim Media Devori yuklandi');
    </script>
</body>
</html>
