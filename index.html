<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MR Vault · Glassmorphism</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='12' fill='%2324A1DE'/%3E%3Cpath d='M12 5v14M5 12h14' stroke='white' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E">
    <style>
        /* =========================================
           1. RESET & VARIABLES
           ========================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            /* Colors */
            --primary: #24A1DE; 
            --primary-dark: #1a7fb0;
            --bg: #0e0e0e; 
            --glass-bg: rgba(28, 28, 28, 0.7);
            --glass-card: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff; 
            --text-secondary: rgba(255, 255, 255, 0.7);
            --success: #2ecc71; 
            --error: #e74c3c;
            
            /* UI Settings */
            --blur-amount: 40px;
            --border-radius-lg: 28px;
            --border-radius-md: 20px;
            --border-radius-sm: 16px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Custom Scrollbar for Webkit */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* =========================================
           2. BASE STYLES & BACKGROUND
           ========================================= */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh;
            -webkit-font-smoothing: antialiased; 
            overflow-x: hidden;
        }
        
        /* Modern Glassmorphism Gradient Background */
        body::before {
            content: ''; 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(36, 161, 222, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(110, 200, 255, 0.1) 0%, transparent 50%);
            pointer-events: none; 
            z-index: -1;
            transform: translateZ(0); /* Hardware Acceleration */
        }
        
        body.login-mode { display: flex; align-items: center; justify-content: center; padding: 16px; }
        .app { display: none; } 
        body.app-mode .app { display: block; }
        body.login-mode .login-container { display: block; } 
        body.app-mode .login-container { display: none; }
        
        /* =========================================
           3. AUTHENTICATION (LOGIN/REGISTER)
           ========================================= */
        .login-container { 
            max-width: 400px; width: 100%; margin: 0 auto; display: none; 
            animation: fadeIn 0.5s ease;
        }
        
        .login-card {
            background: var(--glass-card); 
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            padding: 40px 32px; 
            border-radius: var(--border-radius-lg);
            text-align: center; 
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
            transform: translateZ(0);
        }
        
        .login-logo { margin-bottom: 24px; }
        .login-logo svg { width: 64px; height: 64px; filter: drop-shadow(0 4px 8px rgba(36, 161, 222, 0.3)); }
        .login-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: var(--text); letter-spacing: -0.5px; }
        .login-subtitle { font-size: 15px; color: var(--text-secondary); margin-bottom: 32px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-label {
            display: flex; align-items: center; gap: 6px;
            font-size: 13px; font-weight: 600; color: var(--primary); margin-bottom: 8px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .input-label svg { width: 16px; height: 16px; }
        
        .input-field {
            width: 100%; padding: 14px 18px;
            background: rgba(0, 0, 0, 0.2); 
            border: 1px solid var(--glass-border); 
            border-radius: var(--border-radius-sm);
            color: var(--text); font-size: 16px; outline: none;
            transition: var(--transition);
        }
        .input-field:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(36, 161, 222, 0.2); background: rgba(0,0,0,0.4); }
        .input-field::placeholder { color: var(--text-secondary); opacity: 0.5; }
        
        .login-btn {
            width: 100%; 
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white; border: none; padding: 16px; border-radius: var(--border-radius-sm);
            font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 24px;
            transition: var(--transition); 
            box-shadow: 0 4px 16px rgba(36, 161, 222, 0.3);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .login-btn:hover { box-shadow: 0 6px 20px rgba(36, 161, 222, 0.5); transform: translateY(-2px); }
        .login-btn:active { transform: scale(0.98); }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .toggle-link { color: var(--primary); font-weight: 700; cursor: pointer; margin-left: 6px; transition: color 0.2s;}
        .toggle-link:hover { color: #6ec8ff; }
        .login-toggle { margin-top: 28px; font-size: 15px; color: var(--text-secondary); }
        .error-message { color: var(--error); font-size: 13px; text-align: center; min-height: 20px; margin-top: 12px; }
        
        .spinner {
            width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* =========================================
           4. MAIN APP LAYOUT (HEADER & TABS)
           ========================================= */
        .app-header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
            background: var(--glass-bg); backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border-bottom: 1px solid var(--glass-border);
            transform: translateZ(0);
        }
        .app-header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        .app-header h1 svg { width: 28px; height: 28px; filter: drop-shadow(0 2px 4px rgba(36,161,222,0.4));}
        
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-name { font-size: 15px; font-weight: 500; color: var(--text); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .logout-btn {
            background: var(--glass-card); border: 1px solid var(--glass-border); color: var(--text-secondary);
            padding: 8px 16px; border-radius: 30px; font-size: 13px; font-weight: 500;
            cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 6px;
        }
        .logout-btn svg { width: 16px; height: 16px; }
        .logout-btn:hover { background: rgba(255,255,255,0.15); color: white; }
        .logout-btn:active { background: var(--error); border-color: var(--error); color: white; }

        .big-tabs {
            position: fixed; top: 65px; left: 0; right: 0; z-index: 99;
            padding: 12px 20px 0; display: flex; gap: 24px;
            background: var(--glass-bg); backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border-bottom: 1px solid var(--glass-border);
            transform: translateZ(0);
        }
        .big-tab {
            background: transparent; border: none; color: var(--text-secondary);
            font-size: 16px; font-weight: 600; padding: 0 0 12px 0; cursor: pointer;
            position: relative; transition: color 0.2s; display: flex; align-items: center; gap: 6px;
        }
        .big-tab svg { width: 20px; height: 20px; }
        .big-tab.active { color: var(--primary); }
        .big-tab.active::after {
            content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 3px;
            background: var(--primary); border-radius: 3px 3px 0 0;
            box-shadow: 0 -2px 8px rgba(36,161,222,0.5);
        }

        .category-tabs {
            position: fixed; top: 120px; left: 0; right: 0; z-index: 98;
            padding: 10px 16px; display: flex; gap: 8px; overflow-x: auto;
            white-space: nowrap; scrollbar-width: none;
            background: transparent; backdrop-filter: none;
        }
        .category-tabs::-webkit-scrollbar { display: none; }
        .category-tab {
            background: var(--glass-card); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); color: var(--text-secondary);
            padding: 8px 16px; border-radius: 30px; font-size: 14px; font-weight: 500;
            cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 6px;
        }
        .category-tab svg { width: 16px; height: 16px; }
        .category-tab:hover { background: rgba(255,255,255,0.15); color: white;}
        .category-tab.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(36,161,222,0.3); }

        /* =========================================
           5. POSTS & CONTENT AREA
           ========================================= */
        .content { padding-top: 175px; padding-bottom: 90px; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; padding: 0 16px; }
        .posts-feed { display: flex; flex-direction: column; gap: 20px; }

        .post-card {
            background: var(--glass-card); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: var(--border-radius-md); border: 1px solid var(--glass-border);
            overflow: hidden; 
            animation: fadeIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            will-change: transform, opacity;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .post-header { padding: 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--glass-border); }
        .post-avatar {
            width: 44px; height: 44px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #6ec8ff);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 600; color: white;
            box-shadow: 0 4px 10px rgba(36,161,222,0.4);
        }
        .post-info { flex: 1; }
        .post-author { font-weight: 600; font-size: 15px; color: var(--text); }
        .post-time { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        
        .post-text { padding: 16px; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
        
        .post-media { position: relative; cursor: pointer; background: rgba(0,0,0,0.3); }
        .post-media img, .post-media video { width: 100%; max-height: 400px; object-fit: cover; display: block; }
        .post-media audio { width: 100%; margin: 16px 0; padding: 0 16px; }
        
        .post-category {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 6px 12px; background: rgba(0,0,0,0.3); border-radius: 30px;
            font-size: 12px; margin: 12px 16px; color: var(--text-secondary);
            border: 1px solid var(--glass-border);
        }
        
        .post-actions { padding: 12px 16px; display: flex; gap: 16px; border-top: 1px solid var(--glass-border); }
        .post-actions button {
            background: transparent; border: none; color: var(--text-secondary); font-size: 13px;
            cursor: pointer; display: flex; align-items: center; gap: 6px; padding: 8px 12px;
            border-radius: 30px; transition: var(--transition);
        }
        .post-actions button svg { width: 18px; height: 18px; }
        .post-actions button:hover { background: rgba(255,255,255,0.05); color: white; }
        .post-actions button:active { background: rgba(255,255,255,0.1); transform: scale(0.95); }
        .delete-btn { color: var(--error) !important; margin-left: auto; }
        .delete-btn:hover { background: rgba(231, 76, 60, 0.1) !important; }

        /* =========================================
           6. BLUR LAYER (EXTREME PRIVACY)
           ========================================= */
        .blur-layer {
            position: absolute; 
            inset: 0;
            /* Ekstremal Blur qiymati */
            backdrop-filter: blur(100px) saturate(1.5);
            -webkit-backdrop-filter: blur(100px) saturate(1.5);
            /* Qorong'u fon detallarni yopadi */
            background: rgba(0, 0, 0, 0.5); 
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; 
            transition: opacity 0.3s ease;
            z-index: 2;
        }
        .blur-layer:hover { background: rgba(0,0,0,0.4); }
        .blur-content { text-align: center; color: white; }
        .blur-content svg { width: 48px; height: 48px; margin-bottom: 12px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }
        .blur-text {
            font-size: 14px; font-weight: 600; background: rgba(0,0,0,0.6);
            padding: 10px 20px; border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* =========================================
           7. FLOATING ACTION BUTTON (FAB)
           ========================================= */
        .fab {
            position: fixed; width: 64px; height: 64px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark)); 
            border: none; box-shadow: 0 4px 24px rgba(36,161,222,0.5);
            cursor: grab; z-index: 200; display: flex; align-items: center; justify-content: center;
            bottom: 24px; right: 24px; user-select: none; touch-action: none;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .fab svg { width: 32px; height: 32px; stroke: white; stroke-width: 2; }
        .fab:hover { transform: scale(1.05); }
        .fab:active { cursor: grabbing; transform: scale(0.95); }
        .fab.dragging { transition: none; opacity: 0.9; box-shadow: 0 8px 30px rgba(36,161,222,0.6); transform: scale(1.1); }

        /* =========================================
           8. MODALS & OVERLAYS
           ========================================= */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 300; display: none; align-items: flex-end; justify-content: center;
        }
        .modal-overlay.show { display: flex; animation: fadeInModal 0.3s; }
        @keyframes fadeInModal { from { opacity: 0; } to { opacity: 1; } }

        .upload-modal {
            background: var(--glass-bg); backdrop-filter: blur(var(--blur-amount));
            width: 100%; max-width: 500px; border-radius: var(--border-radius-lg) var(--border-radius-lg) 0 0;
            padding: 24px 24px 30px; animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 90vh; overflow-y: auto; border: 1px solid var(--glass-border);
            border-bottom: none;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .modal-header h3 { font-size: 20px; font-weight: 600; }
        .close-modal { background: rgba(255,255,255,0.1); border: none; color: white; cursor: pointer; padding: 8px; border-radius: 50%; transition: var(--transition); }
        .close-modal:hover { background: rgba(255,255,255,0.2); transform: rotate(90deg); }
        .close-modal svg { width: 24px; height: 24px; }

        .upload-area {
            border: 2px dashed var(--glass-border); border-radius: var(--border-radius-md);
            padding: 40px 20px; text-align: center; cursor: pointer;
            transition: var(--transition); margin-bottom: 20px; background: rgba(0,0,0,0.2);
        }
        .upload-area:hover { border-color: var(--primary); background: rgba(36, 161, 222, 0.05); }
        .upload-icon svg { width: 48px; height: 48px; margin-bottom: 12px; color: var(--primary); }
        
        .preview-area { margin-bottom: 20px; text-align: center; background: rgba(0,0,0,0.3); border-radius: var(--border-radius-sm); padding: 10px;}
        .preview-area img, .preview-area video { max-width: 100%; max-height: 200px; border-radius: 8px; object-fit: contain; }
        
        .caption-input {
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-sm); padding: 16px; color: var(--text);
            font-size: 15px; resize: none; min-height: 100px; margin-bottom: 20px;
            transition: var(--transition); outline: none;
        }
        .caption-input:focus { border-color: var(--primary); background: rgba(0,0,0,0.4); }
        
        .option-group { margin-bottom: 24px; }
        .option-label { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px;}
        .option-label svg { width: 18px; height: 18px; color: var(--primary); }
        
        .category-options { display: flex; flex-wrap: wrap; gap: 10px; }
        .category-option {
            background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
            color: var(--text-secondary); padding: 10px 16px; border-radius: 30px;
            font-size: 14px; cursor: pointer; transition: var(--transition);
            display: flex; align-items: center; gap: 6px;
        }
        .category-option svg { width: 16px; height: 16px; }
        .category-option:hover { background: rgba(255,255,255,0.1); }
        .category-option.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(36,161,222,0.3); }
        
        .visibility-options { display: flex; gap: 24px; }
        .visibility-option { display: flex; align-items: center; gap: 10px; cursor: pointer; color: white; font-size: 15px;}
        .visibility-option input { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }
        
        .checkbox-group { display: flex; flex-direction: column; gap: 16px; background: rgba(0,0,0,0.2); padding: 16px; border-radius: var(--border-radius-sm); border: 1px solid var(--glass-border);}
        .checkbox-item { display: flex; align-items: center; gap: 12px; cursor: pointer; color: white; font-size: 15px;}
        .checkbox-item input { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer;}
        
        .upload-btn {
            width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; border: none; padding: 18px; border-radius: var(--border-radius-sm); 
            font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 10px; transition: var(--transition); box-shadow: 0 4px 15px rgba(36,161,222,0.4);
        }
        .upload-btn svg { width: 22px; height: 22px; }
        .upload-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(36,161,222,0.6); }
        .upload-btn:disabled { opacity: 0.5; cursor: not-allowed; background: rgba(255,255,255,0.1); box-shadow: none; color: var(--text-secondary);}

        /* Viewer Modal */
        .viewer-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95);
            z-index: 400; display: none; flex-direction: column; backdrop-filter: blur(20px);
        }
        .viewer-overlay.show { display: flex; animation: fadeInModal 0.3s; }
        .viewer-header {
            position: absolute; top: 0; left: 0; right: 0; padding: 20px;
            display: flex; align-items: center; gap: 16px; z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .back-btn {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2); color: white; width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition);
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); transform: translateX(-5px); }
        .back-btn svg { width: 24px; height: 24px; }
        
        .viewer-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; margin-top: 60px;}
        .viewer-content img, .viewer-content video { max-width: 100%; max-height: 85vh; object-fit: contain; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);}
        .viewer-content audio { width: 100%; max-width: 500px; }

        /* Password Modal */
        .password-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            background: var(--glass-bg); backdrop-filter: blur(var(--blur-amount));
            padding: 32px 24px; border-radius: var(--border-radius-md); z-index: 500;
            width: 90%; max-width: 360px; display: none; border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .password-modal.show { display: block; transform: translate(-50%, -50%) scale(1); opacity: 1; }
        .password-modal h4 { margin-bottom: 24px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 20px;}
        .password-modal h4 svg { width: 28px; height: 28px; color: var(--primary); }
        .password-modal input { width: 100%; margin-bottom: 20px; }

        /* Toast Messages */
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--glass-bg); backdrop-filter: blur(var(--blur-amount));
            color: var(--text); padding: 14px 28px; border-radius: 40px; font-size: 15px; font-weight: 500;
            z-index: 500; opacity: 0; visibility: hidden; transition: var(--transition);
            border: 1px solid var(--glass-border); max-width: 90%; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 10px;
        }
        .toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
        .toast.error { background: rgba(231, 76, 60, 0.9); color: white; border-color: rgba(255,255,255,0.2);}
        .toast.success { background: rgba(46, 204, 113, 0.9); color: white; border-color: rgba(255,255,255,0.2);}

        /* States */
        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-secondary); }
        .empty-state svg { width: 72px; height: 72px; margin-bottom: 20px; opacity: 0.3; }
        .loading { text-align: center; padding: 60px 20px; color: var(--text-secondary); display: flex; flex-direction: column; align-items: center; gap: 16px;}

        /* Responsive Design */
        @media (max-width: 600px) {

/* Upload area - default */
.upload-area {
    position: relative;
    border: 2px dashed var(--glass-border);
    border-radius: var(--border-radius-md);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    background: rgba(0, 0, 0, 0.2);
    overflow: hidden;
}

/* Drag over holati */
.upload-area.drag-over {
    border-color: var(--primary);
    background: rgba(36, 161, 222, 0.15);
    transform: scale(1.02);
    box-shadow: 0 0 30px rgba(36, 161, 222, 0.3);
}

/* Drag over ichidagi ikonka animatsiyasi */
.upload-area.drag-over .upload-icon svg {
    animation: bounce 0.6s ease infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* Drag overlay (butun ekran bo'ylab) */
.drag-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(36, 161, 222, 0.1);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    border: 4px dashed var(--primary);
}

.drag-overlay.show {
    display: flex;
}

.drag-overlay-content {
    text-align: center;
    color: white;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 40px 60px;
    border-radius: var(--border-radius-lg);
    border: 1px solid var(--glass-border);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    animation: pulse 1.5s ease infinite;
}

@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
}

.drag-overlay-content svg {
    width: 80px;
    height: 80px;
    margin-bottom: 20px;
    color: var(--primary);
}

.drag-overlay-content h2 {
    font-size: 28px;
    margin-bottom: 10px;
}

.drag-overlay-content p {
    color: var(--text-secondary);
    font-size: 16px;
}

/* =========================================
   COPY & PASTE VISUAL INDICATORS
   ========================================= */

/* Paste toast maxsus stillari */
.toast.paste {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 10px 40px rgba(36, 161, 222, 0.4);
}

.toast.paste svg {
    animation: spin 0.5s ease;
}

/* Upload area da paste ishorasi */
.upload-area .paste-hint {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 16px;
    padding: 8px 16px;
    background: rgba(0, 0, 0, 0.2);
    border-radius: 30px;
    font-size: 12px;
    color: var(--text-secondary);
    border: 1px solid var(--glass-border);
}

.upload-area .paste-hint kbd {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid var(--glass-border);
    border-radius: 6px;
    padding: 2px 8px;
    font-family: monospace;
    font-size: 11px;
    color: white;
}

/* Fayl yuklanganda success animatsiyasi */
.upload-area.upload-success {
    border-color: var(--success);
    background: rgba(46, 204, 113, 0.1);
    animation: successPulse 0.5s ease;
}

@keyframes successPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); }
}

/* Drop zone active bo'lganda */
body.drag-active * {
    pointer-events: none;
}

body.drag-active .upload-area,
body.drag-active .drag-overlay {
    pointer-events: auto;
}

            loginSpinner.style.display = 'inline-block'; 
            btnText.style.opacity = '0.5';
            
            try {
                const email = usernameToEmail(username);
                
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    const fullName = document.getElementById('fullName').value.trim();
                    const confirmPassword = document.getElementById('confirmPassword').value;
                    
                    if (!fullName) { 
                        loginError.textContent = 'Ismingizni kiriting'; 
                        return; 
                    }
                    if (password !== confirmPassword) { 
                        loginError.textContent = 'Parollar mos kelmadi'; 
                        return; 
                    }
                    
                    const userCred = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(userCred.user, { displayName: fullName });
                    await addDoc(collection(db, 'users'), { 
                        uid: userCred.user.uid, 
                        username, 
                        fullName, 
                        email, 
                        createdAt: serverTimestamp() 
                    });
                }
            } catch (error) { 
                loginError.textContent = error.message; 
            } finally {
                loginSpinner.style.display = 'none'; 
                btnText.style.opacity = '1';
            }
        });

        // Auth State Observer
        onAuthStateChanged(auth, (user) => {
            if (user) { 
                currentUser = user; 
                body.classList.remove('login-mode'); 
                body.classList.add('app-mode'); 
                displayUserName.textContent = user.displayName || user.email?.split('@')[0] || 'User'; 
                loadPosts(); 
            } else { 
                currentUser = null; 
                body.classList.add('login-mode'); 
                body.classList.remove('app-mode'); 
            }
        });
        
        // Logout
        logoutBtn.addEventListener('click', () => signOut(auth));

        // ==========================================
        // FLOATING ACTION BUTTON (DRAG & DROP)
        // ==========================================
        let isDragging = false, startX, startY, startLeft, startBottom;
        
        fabBtn.addEventListener('mousedown', dragStart);
        document.addEventListener('mousemove', dragMove);
        document.addEventListener('mouseup', dragEnd);
        
        fabBtn.addEventListener('touchstart', dragStart, {passive: false});
        document.addEventListener('touchmove', dragMove, {passive: false});
        document.addEventListener('touchend', dragEnd);
        
        function dragStart(e) {
            isDragging = true; 
            const evt = e.touches ? e.touches[0] : e;
            startX = evt.clientX; 
            startY = evt.clientY; 
            
            const rect = fabBtn.getBoundingClientRect(); 
            startLeft = rect.left; 
            startBottom = window.innerHeight - rect.bottom; 
            
            fabBtn.classList.add('dragging');
            if(e.type === 'touchstart') e.preventDefault();
        }
        
        function dragMove(e) {
            if (!isDragging) return; 
            const evt = e.touches ? e.touches[0] : e;
            
            let newLeft = startLeft + evt.clientX - startX; 
            let newBottom = startBottom - (evt.clientY - startY); 
            
            // Screen boundaries
            newLeft = Math.max(10, Math.min(newLeft, window.innerWidth - 70)); 
            newBottom = Math.max(70, Math.min(newBottom, window.innerHeight - 150)); 
            
            fabBtn.style.left = newLeft + 'px'; 
            fabBtn.style.right = 'auto'; 
            fabBtn.style.bottom = newBottom + 'px'; 
            
            if(e.type === 'touchmove') e.preventDefault();
        }
        
        function dragEnd() {
            isDragging = false; 
            fabBtn.classList.remove('dragging');
        }
        
        fabBtn.addEventListener('click', () => { 
            if (!fabBtn.classList.contains('dragging')) {
                uploadModal.classList.add('show'); 
            }
        });

        // ==========================================
        // UPLOAD & MEDIA HANDLING
        // ==========================================
        
        // Modal Controls
        closeModalBtn.addEventListener('click', () => { uploadModal.classList.remove('show'); resetForm(); });
        uploadModal.addEventListener('click', (e) => { if (e.target === uploadModal) { uploadModal.classList.remove('show'); resetForm(); } });
        uploadArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => { if (e.target.files[0]) handleFile(e.target.files[0]); });
        // ==========================================
// UPLOAD & MEDIA HANDLING (YANGILANGAN)
// ==========================================

// Modalni ochish va yopish
closeModalBtn.addEventListener('click', () => { uploadModal.classList.remove('show'); resetForm(); });
uploadModal.addEventListener('click', (e) => { if (e.target === uploadModal) { uploadModal.classList.remove('show'); resetForm(); } });
uploadArea.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => { if (e.target.files[0]) handleFile(e.target.files[0]); });

// --- DRAG & DROP QISMI ---
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    uploadArea.addEventListener(eventName, (e) => {
        e.preventDefault();
        e.stopPropagation();
    }, false);
});

['dragenter', 'dragover'].forEach(eventName => {
    uploadArea.addEventListener(eventName, () => {
        uploadArea.style.borderColor = 'var(--primary)';
        uploadArea.style.background = 'rgba(36, 161, 222, 0.1)';
    }, false);
});

['dragleave', 'drop'].forEach(eventName => {
    uploadArea.addEventListener(eventName, () => {
        uploadArea.style.borderColor = 'var(--glass-border)';
        uploadArea.style.background = 'rgba(0, 0, 0, 0.2)';
    }, false);
});

uploadArea.addEventListener('drop', (e) => {
    const dt = e.dataTransfer;
    const file = dt.files[0];
    if (file) handleFile(file);
});

// --- COPY & PASTE (CTRL+V) QISMI ---
window.addEventListener('paste', (e) => {
    const items = e.clipboardData.items;
    for (let i = 0; i < items.length; i++) {
        if (items[i].type.indexOf('image') !== -1 || items[i].type.indexOf('video') !== -1) {
            const file = items[i].getAsFile();
            // Agar modal yopiq bo'lsa, ochamiz
            if (!uploadModal.classList.contains('show')) {
                uploadModal.classList.add('show');
            }
            handleFile(file);
            showToast('Fayl xotiradan yuklandi', 'success');
            break;
        }
    }
});

// Faylni qayta ishlash funksiyasi (o'zgarishsiz qoladi)

        // Preview File
        function handleFile(file) { 
            selectedFile = file; 
            previewArea.style.display = 'block'; 
            previewArea.innerHTML = ''; 
            
            if (file.type.startsWith('image')) { 
                const img = document.createElement('img'); 
                img.src = URL.createObjectURL(file); 
                previewArea.appendChild(img); 
            } else if (file.type.startsWith('video')) { 
                const video = document.createElement('video'); 
                video.src = URL.createObjectURL(file); 
                video.controls = true; 
                previewArea.appendChild(video); 
            } else { 
                previewArea.innerHTML = `<div>📄 ${file.name}</div>`; 
            } 
            uploadBtn.disabled = false; 
        }
        
        // Reset Upload Form
        function resetForm() { 
            selectedFile = null; 
            fileInput.value = ''; 
            previewArea.style.display = 'none'; 
            previewArea.innerHTML = ''; 
            captionInput.value = ''; 
            uploadBtn.disabled = true; 
            blurCheck.checked = false; 
            passwordCheck.checked = false; 
            passwordField.style.display = 'none'; 
            postPassword.value = ''; 
            
            document.querySelectorAll('.category-option').forEach(o => o.classList.remove('active')); 
            document.querySelector('[data-cat="boshqa"]').classList.add('active'); 
            selectedCategory = 'boshqa'; 
        }
        
        // Categories & Options
        document.querySelectorAll('.category-option').forEach(option => {
            option.addEventListener('click', function() { 
                document.querySelectorAll('.category-option').forEach(c => c.classList.remove('active')); 
                this.classList.add('active'); 
                selectedCategory = this.dataset.cat; 
            });
        });
        
        passwordCheck.addEventListener('change', () => {
            passwordField.style.display = passwordCheck.checked ? 'block' : 'none';
        });

        // Security: Hash Password
        async function hashPassword(pwd) { 
            const encoder = new TextEncoder(); 
            const data = encoder.encode(pwd); 
            const hash = await crypto.subtle.digest('SHA-256', data); 
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join(''); 
        }

        // Upload Process (Supabase + Firebase)
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile || !currentUser) return;
            
            uploadBtn.disabled = true; 
            uploadBtn.innerHTML = '<span class="spinner" style="display:inline-block; border-color:white; border-top-color:transparent; margin-right:8px;"></span> Yuklanmoqda...';
            
            try {
                // 1. Upload to Supabase Storage
                const timestamp = Date.now();
                const fileName = `posts/${currentUser.uid}/${timestamp}_${selectedFile.name}`;
                const { data, error } = await supabase.storage.from('videos').upload(fileName, selectedFile);
                if (error) throw error;
                
                // 2. Get Public URL
                const { data: { publicUrl } } = supabase.storage.from('videos').getPublicUrl(data.path);
                const isPublic = document.querySelector('input[name="visibility"]:checked').value === 'public';
                
                // 3. Process Password if checked
                let hashedPassword = null;
                if (passwordCheck.checked && postPassword.value) {
                    hashedPassword = await hashPassword(postPassword.value);
                }
                
                // 4. Save to Firestore
                await addDoc(collection(db, 'posts'), { 
                    text: captionInput.value.trim() || null, 
                    mediaUrl: publicUrl, 
                    mediaType: selectedFile.type, 
                    fileName: selectedFile.name, 
                    fileSize: selectedFile.size, 
                    category: selectedCategory, 
                    isPublic, 
                    isBlurred: blurCheck.checked, 
                    hasPassword: passwordCheck.checked && !!postPassword.value, 
                    password: hashedPassword, 
                    userId: currentUser.uid, 
                    userFullName: currentUser.displayName || 'Anonim', 
                    userAvatar: currentUser.photoURL || null, 
                    createdAt: serverTimestamp(), 
                    views: 0, 
                    downloads: 0 
                });
                
                showToast('Post muvaffaqiyatli yuklandi!', 'success'); 
                uploadModal.classList.remove('show'); 
                resetForm();
            } catch (error) { 
                showToast('Xatolik yuz berdi: ' + error.message, 'error'); 
            } finally { 
                uploadBtn.disabled = false; 
                uploadBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Postni Yuklash'; 
            }
        });

        // ==========================================
        // FEED & POST RENDERING
        // ==========================================
        
        // Tab Filters
        document.querySelectorAll('.big-tab').forEach(tab => {
            tab.addEventListener('click', function() { 
                document.querySelectorAll('.big-tab').forEach(bt => bt.classList.remove('active')); 
                this.classList.add('active'); 
                activeBigTab = this.dataset.tab; 
                filterPosts(); 
            });
        });
        
        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.addEventListener('click', function() { 
                document.querySelectorAll('.category-tab').forEach(ct => ct.classList.remove('active')); 
                this.classList.add('active'); 
                activeCategory = this.dataset.cat; 
                filterPosts(); 
            });
        });

        // Load Posts from Firestore
        function loadPosts() { 
            const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc')); 
            
            onSnapshot(q, (snap) => { 
                allPosts = snap.docs.map(d => ({ id: d.id, ...d.data() })); 
                filterPosts(); 
            }, (error) => { 
                postsFeed.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                        <p>${error.message}</p>
                    </div>`; 
            }); 
        }

        // Apply Filters
        function filterPosts() { 
            let filtered = [...allPosts]; 
            
            if (activeBigTab === 'my' && currentUser) {
                filtered = filtered.filter(p => p.userId === currentUser.uid); 
            } else if (activeBigTab === 'public') {
                filtered = filtered.filter(p => p.isPublic === true); 
            }
            
            if (activeCategory !== 'all') {
                filtered = filtered.filter(p => p.category === activeCategory); 
            }
            
            renderPosts(filtered); 
        }

        // Render HTML for Posts
        function renderPosts(posts) {
            if (!posts.length) { 
                postsFeed.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
                        <p>Hozircha postlar mavjud emas</p>
                    </div>`; 
                return; 
            }
            
            postsFeed.innerHTML = posts.map(p => {
                const time = p.createdAt?.toDate?.() || new Date();
                const timeStr = new Intl.DateTimeFormat('uz-UZ', { day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' }).format(time);
                
                const isOwner = currentUser && p.userId === currentUser.uid;
                const hasBlur = p.isBlurred === true;
                const hasPass = p.hasPassword === true && p.password;
                
                let mediaHtml = '';
                if (p.mediaType?.startsWith('image')) {
                    mediaHtml = `<img src="${p.mediaUrl}" loading="lazy" alt="Post Image">`;
                } else if (p.mediaType?.startsWith('video')) {
                    mediaHtml = `<video src="${p.mediaUrl}" controls preload="metadata"></video>`;
                } else if (p.mediaType?.startsWith('audio')) {
                    mediaHtml = `<audio src="${p.mediaUrl}" controls></audio>`;
                } else {
                    mediaHtml = `<div class="post-file" style="padding:40px; text-align:center; color:white;">📄 ${p.fileName || 'Fayl'}</div>`;
                }
                
                let overlayHtml = '';
                if (hasBlur && !hasPass) {
                    overlayHtml = `
                        <div class="blur-layer" data-action="unblur">
                            <div class="blur-content">
                                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
                            </div>
                        </div>`;
                } else if (hasPass) {
                    overlayHtml = `
                        <div class="blur-layer" data-action="password">
                            <div class="blur-content">
                                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                               
                            </div>
                        </div>`;
                }
                
                return `
                    <div class="post-card" data-id="${p.id}" data-password="${p.password || ''}" data-blur="${p.isBlurred}" data-has-password="${p.hasPassword}" data-media='${JSON.stringify(p)}'>
                        <div class="post-header">
                            <div class="post-avatar">${(p.userFullName || 'A')[0]}</div>
                            <div class="post-info">
                                <div class="post-author">${p.userFullName || 'Anonim'}</div>
                                <div class="post-time">${timeStr}</div>
                            </div>
                        </div>
                        
                        ${p.text ? `<div class="post-text">${escapeHtml(p.text)}</div>` : ''}
                        
                        <div class="post-media" data-url="${p.mediaUrl}" data-type="${p.mediaType}">
                            ${mediaHtml}
                            ${overlayHtml}
                        </div>
                        
                        <span class="post-category">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7h-4.5A2.5 2.5 0 0 0 13 9.5v0A2.5 2.5 0 0 0 15.5 12H18"/><path d="M4 7h4.5A2.5 2.5 0 0 1 11 9.5v0A2.5 2.5 0 0 1 8.5 12H6"/><path d="M12 3v18"/></svg> 
                            ${p.category}
                        </span>
                        
                        <div class="post-actions">
                            <button class="view-btn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="1"/></svg> 
                                ${p.views || 0}
                            </button>
                            <button class="copy-btn" data-url="${p.mediaUrl}">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 
                                Havola nusxasi
                            </button>
                            ${isOwner ? `
                                <button class="delete-btn" data-id="${p.id}">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> 
                                    O'chirish
                                </button>
                            ` : ''}
                        </div>
                    </div>`;
            }).join('');
            
            attachPostEvents();
        }

        // Post Interactions (Click, Copy, Delete)
        function attachPostEvents() {
            document.querySelectorAll('.post-media').forEach(el => { 
                el.addEventListener('click', (e) => { 
                    if (e.target.closest('button') || e.target.closest('video') || e.target.closest('audio')) return; 
                    handleMediaClick(el); 
                }); 
            });
            
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => { 
                    e.stopPropagation(); 
                    navigator.clipboard?.writeText(btn.dataset.url); 
                    showToast('Havola nusxalandi', 'success'); 
                });
            });
            
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => { 
                    e.stopPropagation(); 
                    if (!confirm("Postni butunlay o'chirib tashlamoqchimisiz?")) return; 
                    
                    await deleteDoc(doc(db, 'posts', btn.dataset.id)); 
                    showToast('Post o\'chirildi', 'success'); 
                });
            });
        }

        // Handle Image Click (Blur removal & Password check)
        async function handleMediaClick(el) {
            const card = el.closest('.post-card');
            const overlay = el.querySelector('.blur-layer');
            const post = JSON.parse(card.dataset.media); 
            
            if (overlay) { 
                const action = overlay.dataset.action; 
                
                if (action === 'password' || post.hasPassword) { 
                    pendingPost = post; 
                    passwordModal.classList.add('show'); 
                    passwordInput.value = ''; 
                    passwordError.textContent = ''; 
                } else if (action === 'unblur') { 
                    overlay.style.opacity = '0';
                    setTimeout(() => overlay.remove(), 300);
                } 
                return; 
            }
            openViewer(post);
        }

        // Password Verification
        submitPasswordBtn.addEventListener('click', async () => { 
            if (!pendingPost) return; 
            
            const inputHash = await hashPassword(passwordInput.value); 
            
            if (inputHash === pendingPost.password) { 
                passwordModal.classList.remove('show'); 
                openViewer(pendingPost); 
                pendingPost = null; 
            } else { 
                passwordError.textContent = 'Parol noto\'g\'ri kiritildi'; 
            } 
        });
        
        cancelPasswordBtn.addEventListener('click', () => { 
            passwordModal.classList.remove('show'); 
            pendingPost = null; 
        });

        // ==========================================
        // MEDIA VIEWER MODAL
        // ==========================================
        function openViewer(post) {
            viewerContent.innerHTML = '';
            
            if (post.mediaType?.startsWith('image')) { 
                const img = document.createElement('img'); 
                img.src = post.mediaUrl; 
                viewerContent.appendChild(img); 
            } else if (post.mediaType?.startsWith('video')) { 
                const v = document.createElement('video'); 
                v.src = post.mediaUrl; 
                v.controls = true; 
                v.autoplay = true; 
                viewerContent.appendChild(v); 
            } else if (post.mediaType?.startsWith('audio')) { 
                const a = document.createElement('audio'); 
                a.src = post.mediaUrl; 
                a.controls = true; 
                a.autoplay = true; 
                viewerContent.appendChild(a); 
            } else { 
                viewerContent.innerHTML = `
                    <div style="color:white; text-align:center; padding: 40px; background: rgba(255,255,255,0.1); border-radius: 20px;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" style="width:80px;height:80px; margin-bottom: 20px;">
                            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                            <polyline points="13 2 13 9 20 9"/>
                        </svg>
                        <h2>Hujjat fayli</h2>
                        <div style="margin-top:20px;">
                            <a href="${post.mediaUrl}" target="_blank" style="background: var(--primary); color:white; padding: 12px 24px; border-radius: 30px; text-decoration: none; font-weight: bold; display: inline-block;">Hujjatni yuklab olish</a>
                        </div>
                    </div>`; 
            }
            viewerOverlay.classList.add('show');
        }
        
        closeViewerBtn.addEventListener('click', () => {
            viewerOverlay.classList.remove('show');
            viewerContent.innerHTML = ''; // Stop audio/video playing
        });
        
        viewerOverlay.addEventListener('click', (e) => { 
            if (e.target === viewerOverlay) {
                viewerOverlay.classList.remove('show');
                viewerContent.innerHTML = '';
            }
        });

        // ==========================================
        // UTILITIES
        // ==========================================
        function escapeHtml(t) { 
            const d = document.createElement('div'); 
            d.textContent = t; 
            return d.innerHTML; 
        }
        
        function showToast(m, type) { 
            toast.innerHTML = type === 'success' ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> ${m}` : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> ${m}`;
            toast.className = 'toast show ' + type; 
            setTimeout(() => toast.classList.remove('show'), 3500); 
        }
    </script>
</body>
