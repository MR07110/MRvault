<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MR Vault · Personal Media</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='12' fill='%2324A1DE'/%3E%3Cpath d='M12 6v12M6 12h12' stroke='white' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #24A1DE; --primary-dark: #1a7fb0; --bg: #0e0e0e; --card-bg: #1c1c1c;
            --text: #ffffff; --text-secondary: #aaaaaa; --border: #2b2b2b;
            --success: #2ecc71; --error: #e74c3c; --warning: #f39c12;
        }
        [data-theme="light"] {
            --bg: #f4f4f5; --card-bg: #ffffff; --text: #000000; --text-secondary: #707579; --border: #dadce0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased;
        }
        body.login-mode { display: flex; align-items: center; justify-content: center; padding: 16px; }
        .app { display: none; } body.app-mode .app { display: block; }
        body.login-mode .login-container { display: block; } body.app-mode .login-container { display: none; }
        .login-container { max-width: 400px; width: 100%; margin: 0 auto; display: none; }
        .login-card {
            background: var(--card-bg); padding: 40px 32px; border-radius: 28px; text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); border: 1px solid var(--border);
        }
        .login-logo { font-size: 48px; margin-bottom: 24px; }
        .login-title { font-size: 26px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
        .login-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-label { display: block; font-size: 13px; font-weight: 600; color: var(--primary); margin-bottom: 6px; text-transform: uppercase; }
        .input-field {
            width: 100%; padding: 14px 16px; background: #242424; border: 1.5px solid var(--border);
            border-radius: 16px; color: var(--text); font-size: 15px; outline: none; transition: border-color 0.2s;
        }
        .input-field:focus { border-color: var(--primary); }
        .input-field::placeholder { color: var(--text-secondary); opacity: 0.5; }
        .login-btn {
            width: 100%; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white; border: none; padding: 16px; border-radius: 16px; font-size: 16px; font-weight: 600;
            cursor: pointer; margin-top: 16px; transition: transform 0.15s, box-shadow 0.3s;
        }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .toggle-link { color: var(--primary); font-weight: 700; cursor: pointer; margin-left: 6px; }
        .login-toggle { margin-top: 28px; font-size: 14px; color: var(--text-secondary); }
        .error-message { color: var(--error); font-size: 13px; text-align: center; min-height: 20px; margin-top: 12px; }
        .spinner {
            width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
            border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* App Header */
        .app-header {
            position: fixed; top: 0; left: 0; right: 0; background: var(--bg); padding: 12px 16px;
            border-bottom: 1px solid var(--border); z-index: 100; display: flex; align-items: center; justify-content: space-between;
        }
        .app-header h1 { font-size: 20px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-name { font-size: 14px; color: var(--text); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .logout-btn {
            background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
            padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer;
        }

        /* Big Tabs */
        .big-tabs {
            position: fixed; top: 57px; left: 0; right: 0; background: var(--bg); padding: 12px 16px 0;
            border-bottom: 1px solid var(--border); z-index: 99; display: flex; gap: 20px;
        }
        .big-tab {
            background: transparent; border: none; color: var(--text-secondary); font-size: 16px; font-weight: 600;
            padding: 0 0 12px 0; cursor: pointer; position: relative; transition: color 0.2s;
        }
        .big-tab.active { color: var(--primary); }
        .big-tab.active::after {
            content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 3px;
            background: var(--primary); border-radius: 3px 3px 0 0;
        }

        /* Category Mini Tabs */
        .category-tabs {
            position: fixed; top: 110px; left: 0; right: 0; background: var(--bg); padding: 8px 16px;
            border-bottom: 1px solid var(--border); z-index: 98; display: flex; gap: 8px; overflow-x: auto;
            white-space: nowrap; scrollbar-width: none;
        }
        .category-tabs::-webkit-scrollbar { display: none; }
        .category-tab {
            background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
            padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.2s;
        }
        .category-tab.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Content */
        .content { padding-top: 165px; padding-bottom: 80px; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; padding: 0 12px; }
        .posts-feed { display: flex; flex-direction: column; gap: 16px; }

        /* Post Card */
        .post-card {
            background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border);
            overflow: hidden; animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .post-header { padding: 14px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
        .post-avatar {
            width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), #6ec8ff);
            display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; color: white;
        }
        .post-info { flex: 1; }
        .post-author { font-weight: 600; font-size: 14px; color: var(--text); }
        .post-time { font-size: 12px; color: var(--text-secondary); }
        .post-text { padding: 16px; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
        .post-media { position: relative; cursor: pointer; }
        .post-media img, .post-media video { width: 100%; max-height: 400px; object-fit: cover; display: block; }
        .post-media audio { width: 100%; margin: 8px 0; }
        .post-category { display: inline-block; padding: 4px 10px; background: #242424; border-radius: 20px; font-size: 11px; margin: 8px 16px; color: var(--text-secondary); }
        .post-actions { padding: 12px 16px; display: flex; gap: 20px; border-top: 1px solid var(--border); }
        .post-actions button {
            background: transparent; border: none; color: var(--text-secondary); font-size: 13px;
            cursor: pointer; display: flex; align-items: center; gap: 6px; padding: 6px 12px;
            border-radius: 20px; transition: background 0.2s;
        }
        .post-actions button:hover { background: #2a2a2a; }
        .delete-btn { color: var(--error) !important; margin-left: auto; }

        /* Blur Layer */
        .blur-layer {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            backdrop-filter: blur(20px); background: rgba(0,0,0,0.3); display: flex;
            align-items: center; justify-content: center; cursor: pointer;
        }
        .blur-content { text-align: center; color: white; }
        .lock-icon { width: 40px; height: 40px; margin-bottom: 8px; opacity: 0.8; }

        /* FAB */
        .fab {
            position: fixed; width: 60px; height: 60px; border-radius: 30px; background: var(--primary);
            border: none; box-shadow: 0 4px 20px rgba(36,161,222,0.4); cursor: grab; z-index: 200;
            display: flex; align-items: center; justify-content: center; color: white; font-size: 28px;
            bottom: 24px; right: 24px; user-select: none; touch-action: none;
        }
        .fab:active { cursor: grabbing; }
        .fab.dragging { transition: none; opacity: 0.9; }

        /* Upload Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8);
            z-index: 300; display: none; align-items: flex-end; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .upload-modal {
            background: var(--card-bg); width: 100%; max-width: 500px; border-radius: 24px 24px 0 0;
            padding: 24px 20px 20px; animation: slideUp 0.3s ease; max-height: 90vh; overflow-y: auto;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .modal-header h3 { font-size: 18px; font-weight: 600; }
        .close-modal { background: transparent; border: none; color: var(--text-secondary); font-size: 24px; cursor: pointer; }
        .upload-area {
            border: 2px dashed var(--border); border-radius: 20px; padding: 30px 20px; text-align: center;
            cursor: pointer; transition: border-color 0.2s; margin-bottom: 16px;
        }
        .upload-area:hover { border-color: var(--primary); }
        .upload-icon { font-size: 40px; margin-bottom: 12px; }
        .preview-area { margin-bottom: 16px; text-align: center; }
        .preview-area img, .preview-area video { max-width: 100%; max-height: 150px; border-radius: 12px; }
        .caption-input {
            width: 100%; background: #242424; border: 1px solid var(--border); border-radius: 16px;
            padding: 14px 16px; color: var(--text); font-size: 15px; resize: none; min-height: 80px;
            margin-bottom: 16px; font-family: inherit;
        }
        .option-group { margin-bottom: 16px; }
        .option-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; }
        .category-options { display: flex; flex-wrap: wrap; gap: 8px; }
        .category-option {
            background: #242424; border: 1px solid var(--border); color: var(--text-secondary);
            padding: 8px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.2s;
        }
        .category-option.active { background: var(--primary); color: white; border-color: var(--primary); }
        .visibility-options { display: flex; gap: 20px; }
        .visibility-option { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .checkbox-group { display: flex; flex-direction: column; gap: 12px; }
        .checkbox-item { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .password-input { margin-top: 8px; width: 100%; }
        .upload-btn {
            width: 100%; background: var(--primary); color: white; border: none; padding: 16px;
            border-radius: 16px; font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .upload-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Viewer Modal */
        .viewer-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: black; z-index: 400;
            display: none; flex-direction: column;
        }
        .viewer-overlay.show { display: flex; }
        .viewer-header {
            position: absolute; top: 0; left: 0; right: 0; padding: 16px 20px; display: flex;
            align-items: center; gap: 16px; z-index: 10; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
        }
        .back-btn {
            background: rgba(255,255,255,0.1); border: none; color: white; width: 40px; height: 40px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;
            font-size: 24px; backdrop-filter: blur(10px);
        }
        .viewer-content { flex: 1; display: flex; align-items: center; justify-content: center; }
        .viewer-content img, .viewer-content video { max-width: 100%; max-height: 100vh; object-fit: contain; }
        .viewer-content audio { width: 90%; max-width: 400px; }

        /* Password Modal */
        .password-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-bg);
            padding: 24px; border-radius: 20px; z-index: 500; width: 300px; display: none;
        }
        .password-modal.show { display: block; }
        .password-modal h4 { margin-bottom: 16px; text-align: center; }
        .password-modal input { width: 100%; margin-bottom: 16px; }
        .password-modal button { width: 100%; }

        /* Toast */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--card-bg);
            color: var(--text); padding: 12px 24px; border-radius: 40px; font-size: 14px; z-index: 500;
            opacity: 0; visibility: hidden; transition: all 0.3s; border: 1px solid var(--border);
            max-width: 90%; text-align: center;
        }
        .toast.show { opacity: 1; visibility: visible; }
        .toast.error { background: var(--error); color: white; }
        .toast.success { background: var(--success); color: white; }

        /* Empty State */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state .icon { font-size: 64px; margin-bottom: 16px; opacity: 0.5; }

        .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
    </style>
</head>

        const closeModalBtn = document.getElementById('closeModalBtn');
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewArea = document.getElementById('previewArea');
        const captionInput = document.getElementById('captionInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const blurCheck = document.getElementById('blurCheck');
        const passwordCheck = document.getElementById('passwordCheck');
        const passwordField = document.getElementById('passwordField');
        const postPassword = document.getElementById('postPassword');
        const viewerOverlay = document.getElementById('viewerOverlay');
        const viewerContent = document.getElementById('viewerContent');
        const closeViewerBtn = document.getElementById('closeViewerBtn');
        const passwordModal = document.getElementById('passwordModal');
        const passwordInput = document.getElementById('passwordInput');
        const submitPasswordBtn = document.getElementById('submitPasswordBtn');
        const cancelPasswordBtn = document.getElementById('cancelPasswordBtn');
        const passwordError = document.getElementById('passwordError');
        const toast = document.getElementById('toast');

        // ========== AUTH ==========
        toggleFormBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                nameGroup.style.display = 'none'; confirmGroup.style.display = 'none';
                loginTitle.textContent = 'Kirish'; loginSubtitle.textContent = 'Xush kelibsiz!';
                toggleText.textContent = 'Hisobingiz yo\'qmi?'; toggleFormBtn.textContent = 'Ro\'yxatdan o\'tish';
                btnText.textContent = 'KIRISH';
            } else {
                nameGroup.style.display = 'block'; confirmGroup.style.display = 'block';
                loginTitle.textContent = 'Ro\'yxatdan o\'tish'; loginSubtitle.textContent = 'Yangi hisob oching';
                toggleText.textContent = 'Hisobingiz bormi?'; toggleFormBtn.textContent = 'Kirish';
                btnText.textContent = 'RO\'YXATDAN O\'TISH';
            }
            loginError.textContent = '';
        });

        function usernameToEmail(username) {
            return `${username.toLowerCase().replace(/[^a-z0-9]/g, '')}@mrgram.user`;
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || username.length < 3) { loginError.textContent = 'Username kamida 3 ta belgi'; return; }
            if (!password || password.length < 6) { loginError.textContent = 'Parol kamida 6 ta belgi'; return; }
            
            loginSpinner.style.display = 'inline-block'; btnText.style.opacity = '0.5';
            
            try {
                const email = usernameToEmail(username);
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    const fullName = document.getElementById('fullName').value.trim();
                    const confirmPassword = document.getElementById('confirmPassword').value;
                    if (!fullName) { loginError.textContent = 'Ismingizni kiriting'; return; }
                    if (password !== confirmPassword) { loginError.textContent = 'Parollar mos kelmadi'; return; }
                    
                    const userCred = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(userCred.user, { displayName: fullName });
                    await addDoc(collection(db, 'users'), {
                        uid: userCred.user.uid, username, fullName, email,
                        createdAt: serverTimestamp()
                    });
                }
            } catch (error) {
                loginError.textContent = error.message; loginSpinner.style.display = 'none'; btnText.style.opacity = '1';
            }
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                body.classList.remove('login-mode'); body.classList.add('app-mode');
                displayUserName.textContent = user.displayName || user.email?.split('@')[0] || 'User';
                loadPosts();
            } else {
                currentUser = null;
                body.classList.add('login-mode'); body.classList.remove('app-mode');
            }
        });

        logoutBtn.addEventListener('click', () => signOut(auth));

        // ========== FAB DRAG ==========
        let isDragging = false, startX, startY, startLeft, startBottom;
        fabBtn.addEventListener('mousedown', (e) => {
            isDragging = true; startX = e.clientX; startY = e.clientY;
            const rect = fabBtn.getBoundingClientRect();
            startLeft = rect.left; startBottom = window.innerHeight - rect.bottom;
            fabBtn.classList.add('dragging');
        });
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            let newLeft = startLeft + e.clientX - startX;
            let newBottom = startBottom - (e.clientY - startY);
            newLeft = Math.max(10, Math.min(newLeft, window.innerWidth - 70));
            newBottom = Math.max(70, Math.min(newBottom, window.innerHeight - 150));
            fabBtn.style.left = newLeft + 'px'; fabBtn.style.right = 'auto'; fabBtn.style.bottom = newBottom + 'px';
        });
        document.addEventListener('mouseup', () => { isDragging = false; fabBtn.classList.remove('dragging'); });

        // Touch
        fabBtn.addEventListener('touchstart', (e) => {
            isDragging = true; const touch = e.touches[0];
            startX = touch.clientX; startY = touch.clientY;
            const rect = fabBtn.getBoundingClientRect();
            startLeft = rect.left; startBottom = window.innerHeight - rect.bottom;
            fabBtn.classList.add('dragging'); e.preventDefault();
        });
        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const touch = e.touches[0];
            let newLeft = startLeft + touch.clientX - startX;
            let newBottom = startBottom - (touch.clientY - startY);
            newLeft = Math.max(10, Math.min(newLeft, window.innerWidth - 70));
            newBottom = Math.max(70, Math.min(newBottom, window.innerHeight - 150));
            fabBtn.style.left = newLeft + 'px'; fabBtn.style.right = 'auto'; fabBtn.style.bottom = newBottom + 'px';
            e.preventDefault();
        });
        document.addEventListener('touchend', () => { isDragging = false; fabBtn.classList.remove('dragging'); });

        fabBtn.addEventListener('click', (e) => { if (!isDragging) uploadModal.classList.add('show'); });

        // ========== MODAL ==========
        closeModalBtn.addEventListener('click', () => { uploadModal.classList.remove('show'); resetForm(); });
        uploadModal.addEventListener('click', (e) => { if (e.target === uploadModal) { uploadModal.classList.remove('show'); resetForm(); } });
        uploadArea.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', (e) => { if (e.target.files[0]) handleFile(e.target.files[0]); });
        
        function handleFile(file) {
            selectedFile = file; previewArea.style.display = 'block'; previewArea.innerHTML = '';
            if (file.type.startsWith('image')) { const img = document.createElement('img'); img.src = URL.createObjectURL(file); previewArea.appendChild(img); }
            else if (file.type.startsWith('video')) { const video = document.createElement('video'); video.src = URL.createObjectURL(file); video.controls = true; previewArea.appendChild(video); }
            else { previewArea.innerHTML = `<div>📄 ${file.name}</div>`; }
            uploadBtn.disabled = false;
        }

        function resetForm() {
            selectedFile = null; fileInput.value = ''; previewArea.style.display = 'none'; previewArea.innerHTML = '';
            captionInput.value = ''; uploadBtn.disabled = true; blurCheck.checked = false;
            passwordCheck.checked = false; passwordField.style.display = 'none'; postPassword.value = '';
            document.querySelectorAll('.category-option').forEach(o => o.classList.remove('active'));
            document.querySelector('[data-cat="boshqa"]').classList.add('active');
            selectedCategory = 'boshqa';
        }

        document.querySelectorAll('.category-option').forEach(o => o.addEventListener('click', function() {
            document.querySelectorAll('.category-option').forEach(c => c.classList.remove('active'));
            this.classList.add('active'); selectedCategory = this.dataset.cat;
        }));

        passwordCheck.addEventListener('change', () => passwordField.style.display = passwordCheck.checked ? 'block' : 'none');

        async function hashPassword(pwd) {
            const encoder = new TextEncoder(); const data = encoder.encode(pwd);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile || !currentUser) return;
            uploadBtn.disabled = true; uploadBtn.textContent = '⏳ Yuklanmoqda...';
            
            try {
                const timestamp = Date.now();
                const fileName = `posts/${currentUser.uid}/${timestamp}_${selectedFile.name}`;
                const { data, error } = await supabase.storage.from('videos').upload(fileName, selectedFile);
                if (error) throw error;
                const { data: { publicUrl } } = supabase.storage.from('videos').getPublicUrl(data.path);
                
                const isPublic = document.querySelector('input[name="visibility"]:checked').value === 'public';
                let hashedPassword = null;
                if (passwordCheck.checked && postPassword.value) hashedPassword = await hashPassword(postPassword.value);
                
                await addDoc(collection(db, 'posts'), {
                    text: captionInput.value.trim() || null,
                    mediaUrl: publicUrl, mediaType: selectedFile.type, fileName: selectedFile.name,
                    fileSize: selectedFile.size, category: selectedCategory, isPublic,
                    isBlurred: blurCheck.checked, hasPassword: passwordCheck.checked && !!postPassword.value,
                    password: hashedPassword,
                    userId: currentUser.uid, userFullName: currentUser.displayName || 'Anonim',
                    userAvatar: currentUser.photoURL || null,
                    createdAt: serverTimestamp(), views: 0, downloads: 0
                });
                
                showToast('✅ Post qo\'shildi!', 'success');
                uploadModal.classList.remove('show'); resetForm();
            } catch (error) { showToast('❌ Xatolik: ' + error.message, 'error'); }
            finally { uploadBtn.disabled = false; uploadBtn.textContent = '📤 Yuklash'; }
        });

        // ========== TABS ==========
        document.querySelectorAll('.big-tab').forEach(t => t.addEventListener('click', function() {
            document.querySelectorAll('.big-tab').forEach(bt => bt.classList.remove('active'));
            this.classList.add('active'); activeBigTab = this.dataset.tab; filterPosts();
        }));
        document.querySelectorAll('.category-tab').forEach(t => t.addEventListener('click', function() {
            document.querySelectorAll('.category-tab').forEach(ct => ct.classList.remove('active'));
            this.classList.add('active'); activeCategory = this.dataset.cat; filterPosts();
        }));



// ========== FILTER (TUZATILGAN) ==========
function filterPosts() {
    let filtered = [...allPosts];
    
    if (activeBigTab === 'my' && currentUser) {
        filtered = filtered.filter(p => p.userId === currentUser.uid);
    } else if (activeBigTab === 'public') {
        filtered = filtered.filter(p => p.isPublic === true);
    }
    
    if (activeCategory !== 'all') {
        filtered = filtered.filter(p => p.category === activeCategory);
    }
    
    console.log('📊 Filtrlangan:', filtered.length);
    renderPosts(filtered);
}
        function attachPostEvents() {
            document.querySelectorAll('.post-media').forEach(el => {
                el.addEventListener('click', (e) => { if (e.target.closest('button')) return; handleMediaClick(el); });
            });
            document.querySelectorAll('.copy-btn').forEach(b => b.addEventListener('click', (e) => {
                e.stopPropagation(); navigator.clipboard?.writeText(b.dataset.url); showToast('📋 Nusxalandi', 'success');
            }));
            document.querySelectorAll('.delete-btn').forEach(b => b.addEventListener('click', async (e) => {
                e.stopPropagation(); if (!confirm('O\'chirilsinmi?')) return;
                await deleteDoc(doc(db, 'posts', b.dataset.id)); showToast('🗑️ O\'chirildi', 'success');
            }));
        }

        async function handleMediaClick(el) {
            const card = el.closest('.post-card');
            const post = JSON.parse(card.dataset.media);
            
            if (post.hasPassword && post.password) {
                pendingPost = post;
                passwordModal.classList.add('show');
                passwordInput.value = ''; passwordError.textContent = '';
            } else if (post.isBlurred) {
                // Blur ko'rsatish (soddalashtirilgan)
                openViewer(post);
            } else {
                openViewer(post);
            }
        }

        submitPasswordBtn.addEventListener('click', async () => {
            if (!pendingPost) return;
            const inputHash = await hashPassword(passwordInput.value);
            if (inputHash === pendingPost.password) {
                passwordModal.classList.remove('show'); openViewer(pendingPost); pendingPost = null;
            } else { passwordError.textContent = 'Noto\'g\'ri parol'; }
        });
        cancelPasswordBtn.addEventListener('click', () => { passwordModal.classList.remove('show'); pendingPost = null; });

        function openViewer(post) {
            viewerContent.innerHTML = '';
            if (post.mediaType?.startsWith('image')) { const img = document.createElement('img'); img.src = post.mediaUrl; viewerContent.appendChild(img); }
            else if (post.mediaType?.startsWith('video')) { const v = document.createElement('video'); v.src = post.mediaUrl; v.controls = true; v.autoplay = true; viewerContent.appendChild(v); }
            else if (post.mediaType?.startsWith('audio')) { const a = document.createElement('audio'); a.src = post.mediaUrl; a.controls = true; a.autoplay = true; viewerContent.appendChild(a); }
            else { viewerContent.innerHTML = `<div style="color:white;text-align:center;"><div style="font-size:60px;">📄</div><a href="${post.mediaUrl}" target="_blank" style="color:var(--primary);">Yuklab olish</a></div>`; }
            viewerOverlay.classList.add('show');
        }
        
        closeViewerBtn.addEventListener('click', () => viewerOverlay.classList.remove('show'));
        viewerOverlay.addEventListener('click', (e) => { if (e.target === viewerOverlay) viewerOverlay.classList.remove('show'); });

        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function showToast(m, type) { toast.textContent = m; toast.className = 'toast show ' + type; setTimeout(() => toast.classList.remove('show'), 3000); }
    </script>
</body>
</html>
